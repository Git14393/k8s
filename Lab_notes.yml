cat 3.installwebserver.yml 
- name: install and configure web server
  hosts: webservers
  tasks:
    - name: install web server httpd
      ansible.builtin.dnf: #use dnf module
        name: httpd
        state: latest
    - name: start httpd service
      ansible.builtin.service: #use service module
        name: httpd
        state: started
        enabled: true
    - name: copy homepage to webservers
      ansible.builtin.copy:
        src: srcindex.html
        dest: /var/www/html/index.html
    - name: open firewall port http/80
      ansible.posix.firewalld:
        service: http 
        state: enabled
        permanent: true
        immediate: yes

