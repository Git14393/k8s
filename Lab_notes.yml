Kubernetes
Control Node-(Master) - etcd[datastore], scheduler[allocates resources to nodes], control-manage[desiredstate,nodes, ],api server[centralhub of communication]
WorkerNode - Kubelet[connects with master], kube-proxy [pod network management between nodes], container runtime[running pods]

