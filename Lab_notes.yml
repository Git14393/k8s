CPU Metrics 

    Per-second average CPU time spent in user mode over the last 5 minutes:
    rate(node_cpu_seconds_total{mode="user"}[5m])
    Total CPU utilization percentage (sum of all modes/CPUs):
    100 * (1 - rate(node_cpu_seconds_total{mode="idle"}[5m]))
    Per-second average CPU time spent in system mode over the last 10 minutes:
    rate(node_cpu_seconds_total{mode="system"}[10m]) 

Memory Metrics

    Total available memory in bytes:
    node_memory_MemAvailable_bytes
    Total memory utilization percentage:
    100 * (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes 

Filesystem & Disk Metrics

    Available filesystem space in bytes (useful for capacity planning):
    node_filesystem_avail_bytesres_type=auto&g1.res_density=medium&g1.display_mode=lines&g1.show_exemplars=0
    Disk I/O operations per second (reads + writes) over the last minute:
    rate(node_disk_reads_completed_total[1m]) + rate(node_disk_writes_completed_total[1m]) 

Network Metrics

    Average network traffic received in bytes per second over the last 5 minutes:
    rate(node_network_receive_bytes_total[5m])
    Average network traffic transmitted in bytes per second over the last 5 minutes:
    rate(node_network_transmit_bytes_total[5m]) 

System Load & Uptime

    System load average over the last 1 minute:
    node_load1
    System uptime in seconds:
    node_time_seconds - node_boot_time_seconds 

