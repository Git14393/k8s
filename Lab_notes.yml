###deploy Jenkins server in K8s cluster
🏗 High-Level Architecture
Jenkins Controller (Pod/StatefulSet)
        ↓
Kubernetes Plugin
        ↓
Dynamic Agent Pods
        ↓
Job Execution
        ↓
Pods auto-deleted
1️⃣ Beginner View – What We’re Building

When a pipeline runs:
Jenkins talks to Kubernetes API
Kubernetes creates a temporary Pod
Job runs inside Pod
Pod is destroyed
Clean environment every time.

2️⃣ Practitioner – Step-by-Step Clean Setup

Best practice even for labs: install dynamic provisioner.
If Using Bare Metal / VMs → Install Local Path Provisioner
## Pre-req ##
**Install lightweight provisioner:**
kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/local-path-storage.yaml

Verify:
kubectl get storageclass
You should see:   local-path (default)
If not default:

kubectl patch storageclass local-path -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'

✅ Step 1 – Install Jenkins Inside Kubernetes (Recommended)
Create namespace:
kubectl create namespace jenkins

Install using Helm.
Add repo:
helm repo add jenkins https://charts.jenkins.io
helm repo update

Install:
helm install jenkins jenkins/jenkins --namespace jenkins --create-namespace

Check:
kubectl get pods -n jenkins
Wait until running.

Get admin password:
kubectl exec -n jenkins svc/jenkins -c jenkins -- cat /run/secrets/additional/chart-admin-password

Access via [if using port-forwarding]:
kubectl port-forward svc/jenkins 8181:8080 -n jenkins

Open:
http://localhost:8181

✅ Step 2 – Install Kubernetes Plugin

Inside Jenkins UI:
Manage Jenkins → Plugins → Available
Search: Kubernetes  >>>Install >>Restart

✅ Step 3 – Configure Kubernetes Cloud (In-Cluster Mode)
Go:
Manage Jenkins → Clouds → Add Cloud → Kubernetes
Fill:
Name: k8s
Kubernetes URL: https://kubernetes.default.svc
Namespace: jenkins
Credentials: (leave default — it will use in-cluster service account)
Click: Test Connection
Should say: Connection successful

No TLS problems because it's inside cluster.

✅ Step 4 – Add Pod Template

Inside same Cloud:  Add Pod Template:
Name: jenkins-agent
Namespace: jenkins
Labels: k8s-agent
Add Container:
    Name: jnlp
    Image: jenkins/inbound-agent:latest
    Working Directory: /home/jenkins
Set resource requests:
CPU request: 500m
Memory request: 512Mi
Save.

✅ Step 5 – Test Pipeline

Create New Pipeline:

pipeline {
    agent {
        kubernetes {
            label 'k8s-agent'
        }
    }
    stages {
        stage('Test') {
            steps {
                sh 'echo Running in Kubernetes'
                sh 'hostname'
            }
        }
    }
}

Run build. 
In terminal:

kubectl get pods -n jenkins -w