#PV -Persistant volume
apiVersion: v1
kind: PersistentVolume 
metadata:
  name: task-pv-volume
  labels:
    type: local
spec:
  storageClassName: manual
  capacity: 
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/data
---    

#PVC -Prevent volume claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: task-pv-claim
spec:
  storageClassName: manual
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi  
---      

#POD
apiVersion: v1
kind: Pod
metadata:
  name: task-pv-pvc-pod
spec:
  containers:
  - name: pv-container
    image: nginx
    ports:
    - containerPort:  80
      name:  http
    volumeMounts:
    - name: task-pv-storage
      mountPath: /pvcclaimedvol1
  volumes:
    - name: task-pv-storage
      persistentVolumeClaim:
        claimName: task-pv-claim
  restartPolicy: Always